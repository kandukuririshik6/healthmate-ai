<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HealthMate AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <header>
        <a href="index.html" class="logo">
            <span>⚕️</span> HealthMate AI
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container reveal">
        <div class="form-wrapper card">
            <div class="form-image-side" style="background-image: url('https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&q=80&w=1000');"></div>
            <div class="form-container-side">
                <h2 class="form-title">Create an Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regAge">Age</label>
                            <input type="number" id="regAge" class="form-control" required min="1" max="120" placeholder="30">
                        </div>
                        <div class="form-group">
                            <label for="regGender">Gender</label>
                            <select id="regGender" class="form-control" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="regPassword" class="form-control" required placeholder="••••••••" style="padding-right: 45px;">
                            <span class="password-toggle" onclick="togglePassword('regPassword', this)" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light); font-size: 1.2rem; user-select: none;">👁️</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;"><span>Register</span></button>
                    <div class="form-footer">
                        Already have an account? <a href="login.html">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
